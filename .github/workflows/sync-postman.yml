name: Sync Postman → OpenAPI

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 6am UTC
  workflow_dispatch:       # Allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Download Postman collection
        run: |
          curl -s \
            -H "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
            "https://api.getpostman.com/collections/${{ secrets.POSTMAN_COLLECTION_ID }}" \
            | jq '.collection' > postman-collection.json
          echo "Collection downloaded:"
          cat postman-collection.json | jq '.info.name'

      - name: Convert to OpenAPI spec
        run: |
          npm install -g postman-to-openapi
          p2o postman-collection.json -o openapi.yaml --defaultTag "SIMA Third-Party API"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet openapi.yaml 2>/dev/null || [ ! -f openapi.yaml ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openapi.yaml
          git commit -m "chore: sync OpenAPI spec from Postman [$(date +'%Y-%m-%d')]"
          git push
