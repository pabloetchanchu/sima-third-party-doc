    post:
      tags:
        - Version 3 > Master Campaigns
      summary: Create
      description: >-
        Crea una campaña maestra para la sociedad del usuario. Requiere permiso
        CREATE sobre MasterCampaign.


        **Body requerido:** `name`, `cultivation_id`, `planting_time_id`,
        `cycle_id`.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Soja | De primera | 2025/2026
                cultivation_id: 1
                planting_time_id: 1
                cycle_id: 8
      parameters:
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '201':
          description: Successful response
          content:
            application/json: {}
  /api/v3/third_party/master_campaigns/{master_campaign_id}:
    patch:
      tags:
        - Version 3 > Master Campaigns
      summary: Edit
      description: |-
        Actualiza una campaña maestra por id. Requiere permiso EDIT.

        **Body opcional:** `name`.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                name: Soja | De primera | 2025/2026 (editado)
      parameters:
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: master_campaign_id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - Version 3 > Master Campaigns
      summary: Delete
      description: >-
        Elimina (soft delete) una campaña maestra por id. Requiere permiso
        DELETE. Solo si no tiene campañas asociadas.
      parameters:
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: master_campaign_id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v3/third_party/master_campaign_cycles/{cycle_id}:
    get:
      tags:
        - Version 3 > Master Campaign Cycles
      summary: Detail
      description: >-
        Detalle de un ciclo por id, si pertenece al país o la sociedad del
        usuario autenticado.
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: cycle_id
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                id: 1
                name: 2024/25
                date_from: '2024-07-01T00:00:00+00:00'
                date_to: '2025-06-30T00:00:00+00:00'
                is_current: true
                modified_at: '2024-01-15T12:00:00+00:00'
                active: true
