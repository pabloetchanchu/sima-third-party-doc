          description: Not Found
          content:
            application/json:
              schema:
                type: object
              example:
                message: 'Ciclo de campaña maestra no encontrado (id: 999999)'
  /api/v3/third_party/master_campaign_cycles:
    get:
      tags:
        - Version 3 > Master Campaign Cycles
      summary: List
      description: >-
        Lista ciclos de campaña maestra visibles para el país o la sociedad del
        usuario.


        **Query:** `page`, `size` (paginación); `id`, `name` (filtros de
        entidad); `updated_at_from`, `updated_at_to`, `active` (filtros de
        auditoría Third Party). No aplica `created_at_*` ni `deleted_at_*` en
        este recurso.
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: page
          in: query
          schema:
            type: integer
          description: Número de página (paginación).
          example: '1'
        - name: size
          in: query
          schema:
            type: integer
          description: Ítems por página (paginación).
          example: '10'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
              examples:
                example-0:
                  summary: 'Ejemplo: Básico (paginación por defecto)'
                  value:
                    items:
                      - id: 1
                        name: 2024/25
                        date_from: '2024-07-01T00:00:00+00:00'
                        date_to: '2025-06-30T00:00:00+00:00'
                        is_current: true
                        modified_at: '2024-01-15T12:00:00+00:00'
                        active: true
                    current_page: 1
                    next_page: 1
                    total_pages: 1
                    total_items: 1
                example-1:
                  summary: 'Ejemplo: Con page, size e id'
                  value:
                    items: []
                    current_page: 1
                    next_page: 1
                    total_pages: 0
                    total_items: 0
                example-2:
                  summary: 'Ejemplo: Referencia (todos los query params)'
                  value:
                    items: []
                    current_page: 1
                    next_page: 1
                    total_pages: 0
                    total_items: 0
  /api/v3/third_party/phenological_states:
    get:
      tags:
        - Version 3 > Phenological States
      summary: List Phenological States
      description: |-
        Obtiene el listado de estados fenológicos disponibles.

        **Parámetros de paginación:**
        - `page`: Número de página (default: 1)
        - `size`: Elementos por página (default: 10)

        **Filtros disponibles:**
        - `id`: ID específico del estado fenológico
        - `name`: Búsqueda parcial por nombre
        - `cultivation_id`: Filtrar por cultivo específico

        **Ordenamiento:**
        - `order_column`: Columna para ordenar (id, name)
        - `order_dir`: Dirección (asc, desc)

        **Respuesta:**
        Retorna un listado paginado con:
        - `id`: ID del estado fenológico
        - `name`: Nombre traducido (con fallback al valor de BD)
        - `cultivation_id`: ID del cultivo asociado
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: page
          in: query
          schema:
            type: integer
          description: 'Número de página (default: 1)'
          example: '1'
        - name: size
          in: query
          schema:
            type: integer
          description: 'Elementos por página (default: 10)'
          example: '10000'
      responses:
