                      - id: 93
                        adv_category_id: 1
                        name: Acaro-verde
                        scientific_name: Acaro-verde Mononychellus planki
                        description: >-
                          O ácaro-verde é a espécie mais frequente em soja no
                          Brasil, porém é menos agressiva do que os demais
                          ácaros. Na maior parte dos casos ocorre em baixa
                          densidade, porém surtos populacionais podem ocorrer
                          debido a estiagem e uso de determinados agrot...
                        modified_at: '2021-02-23T00:00:00-03:00'
                      - id: 102
                        adv_category_id: 1
                        name: Arañuela roja del maiz
                        scientific_name: Arañuela roja del maiz Oligonychus mexicanus
                        description: >-
                          La araña roja  es una plaga que adquiere importancia
                          en el cultivo de maiz desde la etapa de plántula hasta
                          la madurez. El daño es producido por las raspaduras de
                          los tejidos de la planta  y la succión de la savia de
                          las hojas ocaionando un secado prematuro y un
                          desarrollo anormal. Los daños generalmente inician en
                          las hojas bajas y conforme se incremeta la poblacion
                          invade  las hojas y órganos superiores de la planta.
                          Las condiciones que favorecen el desarrollo de esta
                          plaga son temperaturas altas, humedad baja e
                          incidencia de polvo. En el enves de las hojas dañadas,
                          se observan diminutas arañuelas verdes o café rojizo
                          que se encuentran protegidas por una delicada telaraña
                          y polvo en el que se encuentran adultos, estados
                          inmaduros y huevecillos.
                        modified_at: '2020-09-29T18:35:00-03:00'
                      - id: 107
                        adv_category_id: 1
                        name: Arañuela del trigo
                        scientific_name: Arañuela del trigo Penthaleus major
                        description: >-
                          Mide algo más que 1 mm. Posee cuatro pares de patas,
                          de color rojo. Se alimenta en forma gregaria al
                          atardecer, la noche o primeras horas del día. Prospera
                          con tiempo frío y húmedo, o bien en ambientes de alto
                          contenido de humedad. Prefiere suelos sueltos y
                          livianos.produce amarillamiento y detención del
                          desarrollo, y en casos de ataques tempranos, muerte de
                          plántulas. Las plantas adquieren apariencia plateada,
                          con las puntas de las hojas castañas.
                        modified_at: '2020-09-29T18:33:19-03:00'
                      - id: 113
                        adv_category_id: 1
                        name: Ácaro blanco
                        scientific_name: Ácaro blanco Polyphagotarsonemus latus
                        description: >-
                          O ácaro-branco é pouco frequente em soja no Brasil. É
                          capaz de se multiplicar rapidamente, porém é muito
                          sensível a fatores ambientais como a baixa umidade.
                          Ataca os brotos novos das plantas. São ácaros
                          pequenos, difíceis de serem vistos a olho ...
                        modified_at: '2022-08-17T14:04:00-03:00'
                      - id: 148
                        adv_category_id: 1
                        name: Ácaro
                        scientific_name: Ácaro Tetranychus ludeni
                        description: >-
                          As espécies de ácaros-vermelhos são muito semelhantes
                          entre si. São pouco frequentes em soja no Brasil e
                          ocorrem associados às demais espécies de ácaros.
                          Considera-se que apresentem potencial de ataque
                          semelhante ao do ácaro-rajado, sendo igualme...
                        modified_at: '2022-02-08T09:51:53-03:00'
                      - id: 149
                        adv_category_id: 1
                        name: Arañuela
                        scientific_name: Arañuela Tetranychus urticae
                        description: >-
                          Comienza a multiplicarse a fines de la primavera. Los
                          adultos se localizan generalmente formando colonias en
                          el envés de las hojas. El adulto mide entre 0,6 y 0,8
                          mm. La hembra activa de verano es ovalada, roja, con
                          dos manchas oscuras e irregulares en el dorso, de 0,40
                          mm. La forma hibernante no posee las manchas
                          anteriormente mencionadas. La población puede ser
                          sexuada o existir hembras partenogenéticas. Colocan
                          sus huevos en una delicada tela blanquecina sobre
                          ambas caras de las hojas. Los huevos son de color
                          blanco, esférico y brillante. Oviponen entre 80 a 100
                          huevos. Las ninfas al nacer son incoloras y luego van
                          tornándose de color verdoso. Se puede alimentar de
                          tejidos vegetales dañados. Extrae nutrientes de los
                          tejidos vegetales colonizados. Cuando ataca las hojas
                          puede observarse inicialmente la presencia de
                          puntuaciones amarillentas y luego una progresiva
                          clorosis, e incluso necrosis. Típicamente, la especie
                          teje una tela fina, más o menos tupida, en la que se
                          encuentran todos los estadios de desarrollo, pudiendo
                          cubrir gran parte de las estructuras vegetativas de la
                          planta. En ataques muy severos puede producir
                          defoliación prematura, detención del crecimiento y
                          eventualmente la muerte de la planta.
                        modified_at: '2022-08-17T14:04:05-03:00'
                      - id: 914
                        adv_category_id: 1
                        name: Ácaro de la lepra
                        scientific_name: Ácaro de la lepra Brevipalpus phoenicis
                        description: >-
                          Los ácaros conocidos como falsa arañita son un poco
                          alargados, planos dorsoventralmente, de color rojizo y
                          movimientos lentos. Frecuentemente, estos ácaros no
                          son fácilmente detectados por su tpequeño tamaño
                          (200-300 milímetros de longitud) y su comportamiento
                          inactivo. En el estadio adulto son fácilmente
                          distinguibles ya que poseen 5 pares de setas
                          histerosomales dordolaterales y 2 varillas sensoriales
                          en el tarso II. El primer par de patas se extienden
                          hacia adelante y el segundo par hacia atrás. Estos
                          individuos son partenogenéticos (telitóquicos), las
                          hembras reproducen hembras y raramente se encuentran
                          machos. Ambos, hembras y machos son haploides con dos
                          cromosomas. Los huevos son depositados individualmente
                          en nervaduras, hendiduras y otras áreas protegidas de
                          la superficie de la planta.
                        modified_at: '2022-08-17T14:05:27-03:00'
                      - id: 915
                        adv_category_id: 1
                        name: Ácaro de las yemas
                        scientific_name: Ácaro de las yemas Aceria sheldoni/Eriophyes sheldoni
                        description: >-
                          La hembra es pequeña, mide de 0,17 a 0,18  mm,
                          vermiforme, de color amarillo claro y la cutícula es
                          blanda con escasas cerdas. El macho mide 0,13 mm.
                          Estos ácaros viven ocultos dentro de las yemas a las
                          que dañan o destruyen. No existe una verdadera
                          copulación. Los machos dejan cerca de las hembras los
                          espermatóforos impregnados con una feromona sexual.
                          Las hembras los toman con sus labios genitales y los
                          rompen en contacto con la vagina, liberándose de esta
                          manera los espermatozoides que fecundaran a los
                          óvulos. Los huevos blanquecinos, esféricos, son
                          colocados dentro de las yemas de la planta. Una hembra
                          puede colocar alrededor de 50 huevos. Las ninfas son
                          semejantes al adulto, tienen forma de cuña y sólo dos
                          pares de patas. Son de menor tamaño y de color
                          blanquecino.
                        modified_at: '2022-12-13T12:57:37-03:00'
                      - id: 916
                        adv_category_id: 1
                        name: Ácaro purpura
                        scientific_name: Ácaro purpura Panonychus citri
                        description: >-
                          La hembra adulta es de color rojo oscuro a púrpura,
                          mide 0,4 - 0,5 mm de largo, de cuerpo globoso. Se
                          diferencia de las otras arañuelas por las serdas
                          dorsales largas, dirigidas hacia atrás e implantadas
                          sobre tubérculos. Coloca aproximadamente de 20 a 30
                          huevos, a razón de 2 o 3 huevos por día. El macho
                          adulto es más pequeño (0,35 - 0,40 mm), con el abdomen
                          más puntiagudo y su coloración también es rojiza. El
                          huevo es globoso, casi esférico, achatado, de color
                          anaranjado oscuro - rojizo, con un pedicelo de cuyo
                          extremo salen hilos que se fijan a la superficie de la
                          hoja a modo de sostén. Los mismos son colocados
                          preferentemente en las hojas maduras y siempre a ambos
                          lados de la nervadura central, la mayor cantidad se
                          observa en el envés de las hojas. El ciclo de huevo a
                          huevo se completa en 12 días si las condiciones son
                          favorables, completando unas 10 a 12 generaciones al
                          año. Las larvas se caracterizan por tener solo 3 pares
                          de patas y en los estadios ninfales posteriores
                          aparece el 4º par.
                        modified_at: '2020-09-29T18:36:41-03:00'
                      - id: 917
                        adv_category_id: 1
                        name: Ácaro mexicano
                        scientific_name: Ácaro mexicano Tetranychus mexicanus
                        description: >-
                          Hembras aplanadas (casi cuadrangulares); machos planos
                          y afilados (triangulares), 0.40 mm.
                        modified_at: '2022-11-29T15:18:06-03:00'
                    current_page: 1
                    next_page: 2
                    total_pages: 148
                    total_items: 1471
