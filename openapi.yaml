  /api/v3/third_party/scouting_measures/{new_scouting_measure}:
    get:
      tags:
        - Version 3 > Scoutings > Measure
      summary: Detail
      parameters:
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: new_scouting_measure
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: OK
          headers:
            Date:
              schema:
                type: string
                example: Thu, 24 Oct 2024 19:12:33 GMT
            Server:
              schema:
                type: string
                example: Apache/2.4.38 (Debian)
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.3.7
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Vary:
              schema:
                type: string
                example: Accept-Encoding
            Content-Encoding:
              schema:
                type: string
                example: gzip
            Content-Length:
              schema:
                type: integer
                example: '176'
            Connection:
              schema:
                type: string
                example: close
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                id: 1
                adversity_kind_id: 1
                unit_sample: Individuos en 10 m²
                type: PRESENCE
                created_at: '2020-09-29T18:39:51-03:00'
                modified_at: '2024-10-24T12:49:38-03:00'
                deleted_at: null
                active: true
        '404':
          description: Not Found
          headers:
            Date:
              schema:
                type: string
                example: Thu, 24 Oct 2024 19:15:51 GMT
            Server:
              schema:
                type: string
                example: Apache/2.4.38 (Debian)
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.3.7
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Content-Length:
              schema:
                type: integer
                example: '61'
            Connection:
              schema:
                type: string
                example: close
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                error:
                  code: 404
                  message: scouting_measure_not_found
