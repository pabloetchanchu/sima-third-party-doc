        Obtiene el listado de estados hídricos disponibles.

        **Parámetros de paginación:**
        - `page`: Número de página (default: 1)
        - `size`: Elementos por página (default: 10)

        **Filtros disponibles:**
        - `id`: ID específico del estado hídrico
        - `name`: Búsqueda parcial por nombre

        **Ordenamiento:**
        - `order_column`: Columna para ordenar (id, name)
        - `order_dir`: Dirección (asc, desc)

        **Respuesta:**
        Retorna un listado paginado con:
        - `id`: ID del estado hídrico
        - `name`: Nombre traducido (con fallback al valor de BD)
