  /api/v3/third_party/plot_states:
    get:
      tags:
        - Version 3 > Plot States
      summary: List Plot States
      description: |-
        Obtiene el listado de estados de lote disponibles.

        **Parámetros de paginación:**
        - `page`: Número de página (default: 1)
        - `size`: Elementos por página (default: 10)

        **Filtros disponibles:**
        - `id`: ID específico del estado de lote
        - `name`: Búsqueda parcial por nombre

        **Ordenamiento:**
        - `order_column`: Columna para ordenar (id, name)
        - `order_dir`: Dirección (asc, desc)

        **Respuesta:**
        Retorna un listado paginado con:
        - `id`: ID del estado de lote
        - `name`: Nombre traducido (con fallback al valor de BD)
      parameters:
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: page
          in: query
          schema:
            type: integer
          description: 'Número de página (default: 1)'
          example: '1'
        - name: size
          in: query
          schema:
            type: integer
          description: 'Elementos por página (default: 10)'
          example: '10'
      responses:
        '200':
          description: OK
          headers:
            Date:
              schema:
                type: string
                example: Wed, 22 Oct 2025 00:19:03 GMT
            Server:
              schema:
                type: string
                example: Apache/2.4.54 (Debian)
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.4.33
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Vary:
              schema:
                type: string
                example: Accept-Encoding
            Content-Encoding:
              schema:
                type: string
                example: gzip
            Content-Length:
              schema:
                type: integer
                example: '200'
            Connection:
              schema:
                type: string
                example: close
            Content-Type:
              schema:
                type: string
                example: application/json
