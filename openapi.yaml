  /api/v3/third_party/plots:
    post:
      tags:
        - Version 3 > Plots
      summary: Create
      requestBody:
        content:
          '*/*':
            schema:
              type: string
              example: >-
                "{\n    \"area\": 38.77,\n    \"establishment_id\":
                {{new_establishment}},\n    \"latitude\":
                -33.01170951430673,\n    \"longitude\":
                -60.770449228584766,\n    \"name\": \"Plot 1\",\n   
                \"geometry\":
                \"{\\\"type\\\":\\\"Polygon\\\",\\\"coordinates\\\":[[[178.89312744140625,-0.3968350154009376],[178.99749755859375,-0.5506383054954145],[179.22821044921875,-0.45176514769114756],[178.89312744140625,-0.3968350154009376]]]}\"\n}"
      parameters:
        - name: X-SIMA-APIKEY
          in: header
          schema:
            type: string
          example: '{{new_api_key}}'
        - name: X-SIMA-SYSTEM-ID
          in: header
          schema:
            type: string
          example: '{{system_id}}'
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
        - name: Content-Type
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '201':
          description: Created
          headers:
            Date:
              schema:
                type: string
                example: Wed, 09 Oct 2024 19:55:45 GMT
            Server:
              schema:
                type: string
                example: Apache/2.4.38 (Debian)
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.3.7
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Content-Length:
              schema:
                type: integer
                example: '532'
            Connection:
              schema:
                type: string
                example: close
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                id: 294126
                name: Plot 1
                establishment_id: 120767
                area: 38.77
                geometry: >-
                  {"type":"Polygon","coordinates":[[[178.89312744140625,-0.3968350154009376],[178.99749755859375,-0.5506383054954145],[179.22821044921875,-0.45176514769114756],[178.89312744140625,-0.3968350154009376]]]}
                latitude: -33.011709514307
                longitude: -60.770449228585
                external_code: null
                external_reference: null
                created_at: '2024-10-09T16:55:45-03:00'
                modified_at: '2024-10-09T16:55:45-03:00'
                deleted_at: null
                active: true
        '400':
          description: Bad Request
          headers:
            Date:
              schema:
                type: string
                example: Wed, 09 Oct 2024 19:56:30 GMT
            Server:
              schema:
                type: string
                example: Apache/2.4.38 (Debian)
            X-Powered-By:
              schema:
                type: string
                example: PHP/7.3.7
            Cache-Control:
              schema:
                type: string
                example: no-cache, private
            Content-Length:
              schema:
                type: integer
                example: '83'
            Connection:
              schema:
                type: string
                example: close
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              examples:
                example-0:
                  summary: Create - LatLon invalid
                  value:
                    error:
                      code: 400
                      message: Coordenada de latitude/longitude no válida
                example-1:
                  summary: Create - Geometry not valid
                  value:
                    error:
                      code: 400
                      message: Geometry no válido
